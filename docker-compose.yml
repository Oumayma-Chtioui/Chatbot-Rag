services:

  postgres:
    image: postgres:15
    container_name: chatbot_postgres
    restart: always
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "root"
      POSTGRES_DB: "chatbot_rag"
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d chatbot_rag"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  mongodb:
    image: mongo:7
    container_name: chatbot_mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    command: ["mongod", "--quiet", "--logpath", "/dev/null"]
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: chatbot_redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    image: chatbot-rag-backend
    container_name: chatbot_backend
    restart: always
    environment:
      POSTGRES_URL: ${POSTGRES_URL}
      MONGO_URL: ${MONGO_URL}
      MONGO_DB: ${MONGO_DB}
      SECRET_KEY: ${SECRET_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_API_KEY2: ${GEMINI_API_KEY2}
      LANGCHAIN_TRACING_V2: ${LANGCHAIN_TRACING_V2}
      LANGCHAIN_API_KEY: ${LANGCHAIN_API_KEY}
      LANGCHAIN_PROJECT: ${LANGCHAIN_PROJECT}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_API_KEY2: ${OPENROUTER_API_KEY2}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      APP_URL: ${APP_URL}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY}
      LANGFUSE_HOST: ${LANGFUSE_HOST}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ./Backend:/app
      - ./uploads:/app/uploads
      - backend_packages:/usr/local/lib/python3.11/site-packages
    depends_on:
      - postgres
      - mongodb
      - redis

  worker-ingest:
    image: chatbot-rag-backend
    container_name: chatbot_worker_ingest
    restart: always
    command: celery -A celery_app worker -Q ingest -c 2 --loglevel=info
    environment:
      POSTGRES_URL: ${POSTGRES_URL}
      MONGO_URL: ${MONGO_URL}
      MONGO_DB: ${MONGO_DB}
      SECRET_KEY: ${SECRET_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_API_KEY2: ${GEMINI_API_KEY2}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./Backend:/app
      - ./uploads:/app/uploads
      - backend_packages:/usr/local/lib/python3.11/site-packages
    depends_on:
      - backend
      - redis
      - mongodb

  worker-chat:
    image: chatbot-rag-backend
    container_name: chatbot_worker_chat
    restart: always
    command: celery -A celery_app worker -Q celery -c 4 --loglevel=info
    environment:
      POSTGRES_URL: ${POSTGRES_URL}
      MONGO_URL: ${MONGO_URL}
      MONGO_DB: ${MONGO_DB}
      SECRET_KEY: ${SECRET_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_API_KEY2: ${GEMINI_API_KEY2}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./Backend:/app
      - backend_packages:/usr/local/lib/python3.11/site-packages
    depends_on:
      - backend
      - redis
      - mongodb

  flower:
    image: chatbot-rag-backend
    container_name: chatbot_flower
    restart: always
    command: celery -A celery_app flower --port=5555
    environment:
      REDIS_URL: redis://redis:6379/0
    ports:
      - "5555:5555"
    depends_on:
      - backend
      - redis

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: chatbot_frontend
    restart: always
    ports:
      - "5173:5173"
    volumes:
      - ./Frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
  mongo_data:
  backend_packages: